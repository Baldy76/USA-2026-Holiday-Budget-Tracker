<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USA Trip Tracker v1.7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4338ca">
</head>
<body class="bg-slate-50 font-sans text-slate-900 no-scrollbar">

    <header class="glass-header sticky top-0 z-30">
        <div class="max-w-6xl mx-auto p-4">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-lg font-bold text-white">USA 2026 <span id="view-title" class="text-indigo-200 text-xs ml-2 uppercase tracking-widest">Home</span></h1>
                <div class="text-right text-white">
                    <p class="text-[8px] opacity-70 leading-none font-bold">LIVE RATE</p>
                    <p class="text-sm font-mono font-bold">£1 = $<span id="usd-rate">--</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="stat-pill">
                    <p class="pill-label">Goal</p>
                    <p id="stat-goal" class="pill-value">$0</p>
                </div>
                <div class="stat-pill">
                    <p class="pill-label">Spent</p>
                    <p id="stat-spent" class="pill-value text-orange-300">$0</p>
                </div>
                <div id="stat-remain-bg" class="stat-pill accent">
                    <p class="pill-label">Left</p>
                    <p id="stat-remain" class="pill-value">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 safe-bottom">
        <div id="tab-content" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

        <div id="admin-panel" class="hidden space-y-6">
            <section class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-1">Master Admin</h2>
                <p class="text-xs text-slate-500 mb-6 font-medium">Define your master budget in ££.</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Trip Bankroll (£)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-slate-300 font-bold">£</span>
                            <input type="number" id="input-gbp-limit" class="admin-input" placeholder="5000">
                        </div>
                    </div>
                    <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Calculated Bankroll (USD)</p>
                        <h3 id="calc-usd-limit" class="text-3xl font-black text-indigo-700">$0.00</h3>
                        <p class="text-[9px] font-bold text-indigo-300 mt-1 uppercase">Rate Used: £1 = $<span class="current-rate-text">--</span></p>
                    </div>
                    <button onclick="saveAdminSettings()" class="btn-primary">Update Trip Limit</button>
                </div>
            </section>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="max-w-6xl mx-auto flex justify-around items-center h-full">
            <button onclick="switchTab('LA')" id="nav-LA" class="nav-item">
                <span class="nav-text">LA</span>
            </button>
            <button onclick="switchTab('Utah')" id="nav-Utah" class="nav-item">
                <span class="nav-text">Utah</span>
            </button>
            <button onclick="switchTab('Home')" id="nav-Home" class="nav-item">
                <div class="home-circle">H</div>
            </button>
            <button onclick="switchTab('Vegas')" id="nav-Vegas" class="nav-item">
                <span class="nav-text">Vegas</span>
            </button>
            <button onclick="switchTab('Admin')" id="nav-Admin" class="nav-item">
                <span class="nav-text">Admin</span>
            </button>
        </div>
    </nav>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-50 p-4 flex items-center justify-center">
        <div class="modal-overlay absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="modal-container bg-white w-full max-w-md rounded-[40px] shadow-2xl z-50 overflow-hidden border border-white">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold" id="modal-title">Edit Day</h3>
                    <button onclick="toggleModal()" class="text-slate-300 hover:text-slate-500 text-2xl">✕</button>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="modal-field-group">
                            <label class="modal-label">Budget ($)</label>
                            <input type="number" id="edit-usd" class="modal-input">
                        </div>
                        <div class="modal-field-group">
                            <label class="modal-label text-indigo-500">Spent ($)</label>
                            <input type="number" id="edit-spent" class="modal-input accent">
                        </div>
                    </div>
                    <div class="modal-field-group">
                        <label class="modal-label">Activity Info</label>
                        <textarea id="edit-activity" class="modal-input text-sm" rows="2"></textarea>
                    </div>
                    <button onclick="saveChanges()" class="btn-primary mt-4">Save Entry</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://open.er-api.com/v6/latest/GBP";
        let exchangeRate = 1.35; 
        let currentTab = localStorage.getItem('activeTab_v1.7') || 'Home';
        let editingIndex = null;
        let bankrollGbp = localStorage.getItem('bankrollGbp') || 5000;

        const defaultData = [
            { day: "Mon 20-Jul", loc: "LA", activity: "Pizza", usd: 50, spent: 0 },
            { day: "Tue 21-Jul", loc: "LA", activity: "Disneyland", usd: 500, spent: 0 },
            { day: "Wed 22-Jul", loc: "LA", activity: "San Diego", usd: 400, spent: 0 },
            { day: "Thu 23-Jul", loc: "LA", activity: "LA: Lunch/Dinner", usd: 400, spent: 0 },
            { day: "Fri 24-Jul", loc: "Utah", activity: "Travel to Utah", usd: 500, spent: 0 },
            { day: "Sat 25-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sun 26-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Mon 27-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Tue 28-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Wed 29-Jul", loc: "Utah", activity: "Utah (SLC)", usd: 500, spent: 0 },
            { day: "Thu 30-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Fri 31-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sat 01-Aug", loc: "Vegas", activity: "Travel to Vegas", usd: 500, spent: 0 },
            { day: "Sun 02-Aug", loc: "Vegas", activity: "Vegas Shopping", usd: 1000, spent: 0 },
            { day: "Mon 03-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 300, spent: 0 },
            { day: "Tue 04-Aug", loc: "Vegas", activity: "Vegas Dinner", usd: 200, spent: 0 },
            { day: "Wed 05-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 500, spent: 0 },
            { day: "Thu 06-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 200, spent: 0 },
            { day: "Fri 07-Aug", loc: "Home", activity: "Flight Home", usd: 0, spent: 0 }
        ];

        let tripData = JSON.parse(localStorage.getItem('holidayBudget_v1.7')) || defaultData;

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                exchangeRate = data.rates.USD;
                document.querySelectorAll('.current-rate-text').forEach(el => el.innerText = exchangeRate.toFixed(2));
                document.getElementById('usd-rate').innerText = exchangeRate.toFixed(2);
            } catch (e) { console.warn("Using offline fallback"); }
            document.getElementById('input-gbp-limit').value = bankrollGbp;
            switchTab(currentTab);
        }

        function switchTab(tabName) {
            currentTab = tabName;
            localStorage.setItem('activeTab_v1.7', tabName);
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabName}`).classList.add('active');
            document.getElementById('view-title').innerText = tabName;
            if(tabName === 'Admin') {
                document.getElementById('tab-content').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('tab-content').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                renderGrid(tabName);
            }
            updateStats();
        }

        function renderGrid(filter) {
            const grid = document.getElementById('tab-content');
            const data = filter === 'Home' ? tripData : tripData.filter(d => d.loc === filter);
            grid.innerHTML = data.map((item) => {
                const globalIndex = tripData.findIndex(d => d.day === item.day);
                const variance = item.usd - item.spent;
                const vColor = variance >= 0 ? 'text-green-500' : 'text-red-500';
                return `
                <div class="trip-card">
                    <div class="flex justify-between items-start">
                        <span class="card-date">${item.day}</span>
                        <button onclick="openEdit(${globalIndex})" class="edit-pill">Update</button>
                    </div>
                    <p class="card-activity">${item.activity}</p>
                    <div class="card-footer">
                        <div class="flex flex-col">
                            <span class="footer-label">Budget</span>
                            <span class="footer-val">$${item.usd}</span>
                        </div>
                        <div class="flex flex-col text-right">
                            <span class="footer-label">Spent</span>
                            <span class="footer-val text-indigo-600">$${item.spent}</span>
                        </div>
                    </div>
                    <div class="flex justify-between mt-2 pt-2 border-t border-slate-50 items-center">
                         <span class="footer-label">Variance</span>
                         <span class="text-xs font-black ${vColor}">${variance >= 0 ? '+' : ''}${variance}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function updateStats() {
            const totalActualUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
            const limitUsd = bankrollGbp * exchangeRate;
            const remainingUsd = limitUsd - totalActualUsd;
            document.getElementById('stat-goal').innerText = `$${Math.round(limitUsd)}`;
            document.getElementById('stat-spent').innerText = `$${Math.round(totalActualUsd)}`;
            document.getElementById('stat-remain').innerText = `$${Math.round(remainingUsd)}`;
            document.getElementById('calc-usd-limit').innerText = `$${limitUsd.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const remainBg = document.getElementById('stat-remain-bg');
            if(remainingUsd < 0) { remainBg.classList.add('danger'); }
            else { remainBg.classList.remove('danger'); }
        }

        function saveAdminSettings() {
            bankrollGbp = document.getElementById('input-gbp-limit').value;
            localStorage.setItem('bankrollGbp', bankrollGbp);
            updateStats();
            alert("Bankroll Updated!");
        }

        function openEdit(index) {
            editingIndex = index;
            const item = tripData[index];
            document.getElementById('modal-title').innerText = item.day;
            document.getElementById('edit-usd').value = item.usd;
            document.getElementById('edit-spent').value = item.spent;
            document.getElementById('edit-activity').value = item.activity;
            toggleModal();
        }

        function saveChanges() {
            tripData[editingIndex].usd = parseFloat(document.getElementById('edit-usd').value) || 0;
            tripData[editingIndex].spent = parseFloat(document.getElementById('edit-spent').value) || 0;
            tripData[editingIndex].activity = document.getElementById('edit-activity').value;
            localStorage.setItem('holidayBudget_v1.7', JSON.stringify(tripData));
            toggleModal();
            switchTab(currentTab);
        }

        function toggleModal() {
            document.getElementById('modal').classList.toggle('opacity-0');
            document.getElementById('modal').classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        init();
    </script>
</body>
</html>
