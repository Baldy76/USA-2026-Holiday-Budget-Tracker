<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USA Trip Tracker v2.1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#4338ca">
</head>
<body class="bg-slate-50 text-slate-900 no-scrollbar">

    <header class="glass-header sticky top-0 z-30">
        <div class="max-w-6xl mx-auto p-5 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-white tracking-tighter italic">USA '26</h1>
                <p id="view-title" class="text-indigo-100 text-[10px] uppercase font-black tracking-widest">Dashboard</p>
            </div>
            <div class="text-right text-white bg-white/20 px-4 py-1.5 rounded-full border border-white/20">
                <p class="text-xs font-mono font-black tracking-tight">£1 = $<span id="usd-rate">--</span></p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 safe-bottom">
        
        <div id="dashboard-view" class="space-y-6">
            
            <section class="dash-card-hero">
                <div class="flex justify-between items-start mb-4">
                    <p class="dash-label text-white opacity-90 font-black">🏦 Master Bankroll</p>
                </div>
                <div class="flex justify-between items-end">
                    <h2 id="dash-goal-usd" class="text-4xl font-black text-white">$0</h2>
                    <h3 id="dash-goal-gbp" class="text-xl font-bold text-indigo-100">£0</h3>
                </div>
            </section>

            <div class="grid grid-cols-2 gap-4">
                <section class="dash-card border-l-4 border-orange-500">
                    <p class="dash-label">💸 Total Spent</p>
                    <h2 id="dash-spent-usd" class="text-2xl font-black text-orange-600">$0</h2>
                    <p id="dash-spent-gbp" class="text-xs font-bold text-slate-400">£0</p>
                </section>
                <section id="dash-remain-card" class="dash-card border-l-4 border-green-500">
                    <p class="dash-label">💰 Remaining</p>
                    <h2 id="dash-remain-usd" class="text-2xl font-black text-green-600">$0</h2>
                    <p id="dash-remain-gbp" class="text-xs font-bold text-slate-400">£0</p>
                </section>
            </div>

            <div class="mt-8">
                <div class="flex items-center gap-2 mb-4 ml-1">
                    <span class="text-lg">📍</span>
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Regional Health (Budget vs Actual)</p>
                </div>
                <div id="regional-stats" class="space-y-3">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-[32px] shadow-lg border border-slate-100">
                <div class="flex justify-between mb-3 items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Budget Burn</span>
                    <span id="burn-percent" class="bg-indigo-600 text-white px-2 py-1 rounded-lg text-[10px] font-black">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div id="burn-progress" class="bg-indigo-600 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="tab-content" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

        <div id="admin-panel" class="hidden">
            <section class="bg-white p-8 rounded-[40px] shadow-2xl border border-slate-50">
                <div class="flex items-center gap-3 mb-8">
                    <span class="text-2xl">⚙️</span>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight">Admin Control</h2>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Trip Bankroll (£)</label>
                        <div class="relative">
                            <span class="absolute left-5 top-4 text-slate-400 font-bold text-xl">£</span>
                            <input type="number" id="input-gbp-limit" class="admin-input-premium" placeholder="5000">
                        </div>
                    </div>
                    <button onclick="saveAdminSettings()" class="btn-gradient">
                        Sync Changes & Update Dashboard
                    </button>
                    <p class="text-center text-[10px] text-slate-400 font-medium italic">Pushing this will recalculate all regional conversions and save to local storage.</p>
                </div>
            </section>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="max-w-6xl mx-auto flex justify-around items-center h-full px-2">
            <button onclick="switchTab('LA')" id="nav-LA" class="nav-item">
                <span class="nav-icon">🌴</span><span class="nav-text">LA</span>
            </button>
            <button onclick="switchTab('Utah')" id="nav-Utah" class="nav-item">
                <span class="nav-icon">🏔️</span><span class="nav-text">Utah</span>
            </button>
            <button onclick="switchTab('Home')" id="nav-Home" class="nav-item">
                <div class="home-circle-gradient">🏠</div>
            </button>
            <button onclick="switchTab('Vegas')" id="nav-Vegas" class="nav-item">
                <span class="nav-icon">🎰</span><span class="nav-text">Vegas</span>
            </button>
            <button onclick="switchTab('Admin')" id="nav-Admin" class="nav-item">
                <span class="nav-icon">⚙️</span><span class="nav-text">Admin</span>
            </button>
        </div>
    </nav>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-50 p-4 flex items-center justify-center">
        <div class="modal-overlay absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
        <div class="modal-container bg-white w-full max-w-md rounded-[48px] shadow-2xl z-50 overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-black tracking-tight" id="modal-title">Edit Entry</h3>
                    <button onclick="toggleModal()" class="bg-slate-100 p-2 rounded-full text-slate-400 hover:text-slate-900">✕</button>
                </div>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="modal-label">Planned ($)</label>
                            <input type="number" id="edit-usd" class="modal-input-premium">
                        </div>
                        <div>
                            <label class="modal-label text-indigo-600">Spent ($)</label>
                            <input type="number" id="edit-spent" class="modal-input-premium accent">
                        </div>
                    </div>
                    <div>
                        <label class="modal-label">Notes</label>
                        <textarea id="edit-activity" class="modal-input-premium text-sm" rows="2"></textarea>
                    </div>
                    <button onclick="saveChanges()" class="btn-gradient mt-4">Save Entry</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://open.er-api.com/v6/latest/GBP";
        let exchangeRate = 1.35; 
        let currentTab = localStorage.getItem('activeTab_v2.1') || 'Home';
        let bankrollGbp = localStorage.getItem('bankrollGbp') || 5000;
        let editingIndex = null;

        const defaultData = [
            { day: "Mon 20-Jul", loc: "LA", activity: "Pizza", usd: 50, spent: 0 },
            { day: "Tue 21-Jul", loc: "LA", activity: "Disneyland", usd: 500, spent: 0 },
            { day: "Wed 22-Jul", loc: "LA", activity: "San Diego", usd: 400, spent: 0 },
            { day: "Thu 23-Jul", loc: "LA", activity: "LA: Lunch/Dinner", usd: 400, spent: 0 },
            { day: "Fri 24-Jul", loc: "Utah", activity: "Travel to Utah", usd: 500, spent: 0 },
            { day: "Sat 25-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sun 26-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Mon 27-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Tue 28-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Wed 29-Jul", loc: "Utah", activity: "Utah (SLC)", usd: 500, spent: 0 },
            { day: "Thu 30-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Fri 31-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sat 01-Aug", loc: "Vegas", activity: "Travel to Vegas", usd: 500, spent: 0 },
            { day: "Sun 02-Aug", loc: "Vegas", activity: "Vegas Shopping", usd: 1000, spent: 0 },
            { day: "Mon 03-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 300, spent: 0 },
            { day: "Tue 04-Aug", loc: "Vegas", activity: "Vegas Dinner", usd: 200, spent: 0 },
            { day: "Wed 05-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 500, spent: 0 },
            { day: "Thu 06-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 200, spent: 0 },
            { day: "Fri 07-Aug", loc: "Home", activity: "Flight Home", usd: 0, spent: 0 }
        ];

        let tripData = JSON.parse(localStorage.getItem('holidayBudget_v2.1')) || defaultData;

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                exchangeRate = data.rates.USD;
                document.getElementById('usd-rate').innerText = exchangeRate.toFixed(2);
            } catch (e) { console.warn("Fallback rate used"); }
            document.getElementById('input-gbp-limit').value = bankrollGbp;
            switchTab(currentTab);
        }

        function switchTab(tabName) {
            currentTab = tabName;
            localStorage.setItem('activeTab_v2.1', tabName);
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabName}`).classList.add('active');
            document.getElementById('view-title').innerText = (tabName === 'Home' ? 'Dashboard' : tabName);
            
            const views = ['dashboard-view', 'tab-content', 'admin-panel'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));

            if(tabName === 'Home') {
                document.getElementById('dashboard-view').classList.remove('hidden');
                updateDashboard();
            } else if(tabName === 'Admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('tab-content').classList.remove('hidden');
                renderGrid(tabName);
            }
        }

        function updateDashboard() {
            const totalActualUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
            const limitUsd = bankrollGbp * exchangeRate;
            const remainingUsd = limitUsd - totalActualUsd;
            const burnPercent = (totalActualUsd / limitUsd) * 100;

            document.getElementById('dash-goal-usd').innerText = `$${Math.round(limitUsd).toLocaleString()}`;
            document.getElementById('dash-goal-gbp').innerText = `£${Math.round(bankrollGbp).toLocaleString()}`;
            document.getElementById('dash-spent-usd').innerText = `$${Math.round(totalActualUsd).toLocaleString()}`;
            document.getElementById('dash-spent-gbp').innerText = `£${Math.round(totalActualUsd / exchangeRate).toLocaleString()}`;
            document.getElementById('dash-remain-usd').innerText = `$${Math.round(remainingUsd).toLocaleString()}`;
            document.getElementById('dash-remain-gbp').innerText = `£${Math.round(remainingUsd / exchangeRate).toLocaleString()}`;
            document.getElementById('burn-percent').innerText = `${Math.round(burnPercent)}%`;
            document.getElementById('burn-progress').style.width = `${Math.min(burnPercent, 100)}%`;

            const locs = { 'LA': '🌴', 'Utah': '🏔️', 'Vegas': '🎰' };
            const regionalContainer = document.getElementById('regional-stats');
            regionalContainer.innerHTML = Object.entries(locs).map(([loc, icon]) => {
                const data = tripData.filter(d => d.loc === loc);
                const plannedUsd = data.reduce((s, i) => s + i.usd, 0);
                const actualUsd = data.reduce((s, i) => s + i.spent, 0);
                const diffUsd = plannedUsd - actualUsd;
                
                // Conversions
                const plannedGbp = (plannedUsd / exchangeRate).toFixed(0);
                const actualGbp = (actualUsd / exchangeRate).toFixed(0);
                const diffGbp = (diffUsd / exchangeRate).toFixed(0);

                const statusBg = actualUsd === 0 ? 'bg-white' : (diffUsd >= 0 ? 'bg-green-50' : 'bg-red-50');
                const diffColor = diffUsd >= 0 ? 'text-green-600' : 'text-red-600';

                return `
                <div class="${statusBg} p-5 rounded-[28px] shadow-sm border border-slate-100 flex flex-col gap-3">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${icon}</span>
                            <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${loc}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Regional Left</p>
                             <p class="text-xs font-black ${diffColor}">$${diffUsd} <span class="opacity-50 text-[10px]">/ £${diffGbp}</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase leading-none mb-1">Planned</p>
                            <p class="text-sm font-bold text-slate-700">$${plannedUsd} <span class="text-[10px] text-slate-300">/ £${plannedGbp}</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase leading-none mb-1">Spent</p>
                            <p class="text-sm font-black text-indigo-600">$${actualUsd} <span class="text-[10px] text-indigo-300">/ £${actualGbp}</span></p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderGrid(filter) {
            const grid = document.getElementById('tab-content');
            const data = tripData.filter(d => d.loc === filter);
            grid.innerHTML = data.map((item) => {
                const globalIndex = tripData.findIndex(d => d.day === item.day);
                return `
                <div class="trip-card-premium">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-indigo-500 uppercase">${item.day}</span>
                        <button onclick="openEdit(${globalIndex})" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">Update</button>
                    </div>
                    <p class="text-[12px] text-slate-500 font-medium italic mb-4">"${item.activity}"</p>
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-[20px]">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase">Goal</p>
                            <p class="text-lg font-black">$${item.usd}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-indigo-400 uppercase">Actual</p>
                            <p class="text-lg font-black text-indigo-600">$${item.spent}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function saveAdminSettings() {
            bankrollGbp = document.getElementById('input-gbp-limit').value;
            localStorage.setItem('bankrollGbp', bankrollGbp);
            localStorage.setItem('holidayBudget_v2.1', JSON.stringify(tripData)); // Force save
            switchTab('Home');
            alert("Success! Dashboard Updated.");
        }

        function openEdit(index) {
            editingIndex = index;
            const item = tripData[index];
            document.getElementById('modal-title').innerText = item.day;
            document.getElementById('edit-usd').value = item.usd;
            document.getElementById('edit-spent').value = item.spent;
            document.getElementById('edit-activity').value = item.activity;
            toggleModal();
        }

        function saveChanges() {
            tripData[editingIndex].usd = parseFloat(document.getElementById('edit-usd').value) || 0;
            tripData[editingIndex].spent = parseFloat(document.getElementById('edit-spent').value) || 0;
            tripData[editingIndex].activity = document.getElementById('edit-activity').value;
            localStorage.setItem('holidayBudget_v2.1', JSON.stringify(tripData));
            toggleModal();
            switchTab(currentTab);
        }

        function toggleModal() {
            document.getElementById('modal').classList.toggle('opacity-0');
            document.getElementById('modal').classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        init();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
