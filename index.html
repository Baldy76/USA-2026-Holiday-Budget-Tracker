<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Budget Tracker v1.2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4338ca">
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 no-scrollbar">

    <header class="bg-indigo-700 text-white p-6 shadow-md sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">USA Trip Tracker <span class="text-xs font-normal opacity-50">v1.2.0</span></h1>
                <p id="live-rate" class="text-xs opacity-70 italic">Syncing rates...</p>
            </div>
            <div class="text-right">
                <span class="text-xs uppercase tracking-widest opacity-80">Live Rate</span>
                <p class="text-2xl font-mono">£1 = $<span id="usd-rate">--</span></p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 pb-24">
        <section class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Total USD ($)</p>
                <h2 id="total-usd" class="text-2xl font-bold text-green-600">$0.00</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Estimated Cost (£)</p>
                <h2 id="total-gbp" class="text-2xl font-bold text-indigo-600">£0.00</h2>
            </div>
        </section>

        <div id="budget-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7 gap-4">
            </div>
    </main>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-60"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-3xl shadow-2xl z-50 overflow-y-auto">
            <div class="modal-content py-6 text-left px-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-slate-800" id="modal-title">Edit Day</h3>
                    <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600 font-bold">✕</button>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Activities</label>
                    <textarea id="edit-activity" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" rows="3"></textarea>
                </div>
                
                <div class="mb-8">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Daily Budget ($)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-slate-400">$</span>
                        <input type="number" id="edit-usd" step="0.01" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-7 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="saveChanges()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">Save Changes</button>
                    <button onclick="toggleModal()" class="w-full py-2 text-slate-400 text-sm font-semibold italic text-center">Dismiss</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://open.er-api.com/v6/latest/GBP";
        let exchangeRate = 1.30; 
        let editingIndex = null;

        // Data exactly from your spreadsheet image
        let tripData = JSON.parse(localStorage.getItem('holidayBudget_v1.2')) || [
            { day: "Mon 20-Jul", activity: "Pizza", usd: 50.00 },
            { day: "Tue 21-Jul", activity: "Disneyland: Breakfast, Lunch, Dinner, Spends", usd: 500.00 },
            { day: "Wed 22-Jul", activity: "San Diego: Lunch, Dinner, Spends", usd: 400.00 },
            { day: "Thu 23-Jul", activity: "LA: Lunch, Dinner, Spends", usd: 400.00 },
            { day: "Fri 24-Jul", activity: "Travel to Utah: Breakfast, Lunch, Dinner, Shopping", usd: 500.00 },
            { day: "Sat 25-Jul", activity: "Utah: Dinner, Spends", usd: 250.00 },
            { day: "Sun 26-Jul", activity: "Utah: Dinner, Spends", usd: 250.00 }
        ];

        async function fetchRates() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                exchangeRate = data.rates.USD;
                document.getElementById('usd-rate').innerText = exchangeRate.toFixed(2);
                document.getElementById('live-rate').innerText = "Live: £1 = $" + exchangeRate.toFixed(2);
                render();
            } catch (e) {
                document.getElementById('live-rate').innerText = "Offline: Using 1.30 fallback";
                render();
            }
        }

        function render() {
            const grid = document.getElementById('budget-grid');
            let totalUsd = 0;
            
            grid.innerHTML = tripData.map((item, index) => {
                totalUsd += parseFloat(item.usd || 0);
                const gbpCost = (item.usd / exchangeRate).toFixed(2);
                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-56 hover:shadow-md transition-shadow">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-indigo-400 uppercase tracking-tighter">${item.day}</span>
                            <button onclick="openEdit(${index})" class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded-lg font-bold uppercase tracking-wider">Edit</button>
                        </div>
                        <p class="text-xs text-slate-600 leading-relaxed overflow-hidden" style="display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;">${item.activity}</p>
                    </div>
                    <div class="mt-4">
                        <div class="flex items-baseline gap-1">
                            <p class="text-2xl font-black text-slate-800">$${item.usd.toFixed(2)}</p>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Est: £${gbpCost}</p>
                    </div>
                </div>`;
            }).join('');

            const totalGbp = totalUsd / exchangeRate;
            document.getElementById('total-usd').innerText = `$${totalUsd.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total-gbp').innerText = `£${totalGbp.toLocaleString(undefined, {maximumFractionDigits: 2})}`;
            
            localStorage.setItem('holidayBudget_v1.2', JSON.stringify(tripData));
        }

        function openEdit(index) {
            editingIndex = index;
            document.getElementById('modal-title').innerText = tripData[index].day;
            document.getElementById('edit-activity').value = tripData[index].activity;
            document.getElementById('edit-usd').value = tripData[index].usd;
            toggleModal();
        }

        function saveChanges() {
            tripData[editingIndex].activity = document.getElementById('edit-activity').value;
            tripData[editingIndex].usd = parseFloat(document.getElementById('edit-usd').value) || 0;
            toggleModal();
            render();
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        fetchRates();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
