<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>USA Trip Tracker v2.7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#4338ca">
</head>
<body class="bg-slate-50 text-slate-900 no-scrollbar">

    <header id="main-header" class="theme-home sticky top-0 z-30 transition-all duration-500">
        <div class="max-w-6xl mx-auto p-6 pb-5">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-black text-white tracking-tighter">USA '26</h1>
                    <p id="view-title" class="text-white/80 text-[10px] uppercase font-black tracking-[0.2em]">Master Budget</p>
                </div>
                <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/30 text-white shadow-sm">
                    <p class="text-[8px] font-black uppercase opacity-70 leading-none mb-1">Live Rate</p>
                    <p class="text-sm font-mono font-black">£1 = $<span id="usd-rate">1.35</span></p>
                </div>
            </div>
            
            <div id="header-stats" class="grid grid-cols-3 gap-3">
                <div class="header-stat-pill">
                    <p class="stat-label">Budget</p>
                    <p id="stat-goal-usd" class="stat-val">$0</p>
                    <p id="stat-goal-gbp" class="stat-val-sub">£0</p>
                </div>
                <div class="header-stat-pill">
                    <p class="stat-label">Spent</p>
                    <p id="stat-spent-usd" class="stat-val text-orange-200">$0</p>
                    <p id="stat-spent-gbp" class="stat-val-sub text-orange-200/70">£0</p>
                </div>
                <div id="remain-pill" class="header-stat-pill bg-white/30 border-white/50 transition-colors">
                    <p class="stat-label">Balance</p>
                    <p id="stat-remain-usd" class="stat-val">$0</p>
                    <p id="stat-remain-gbp" class="stat-val-sub">£0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 safe-bottom">
        
        <div id="dashboard-view" class="space-y-6">
            
            <div class="bg-white p-6 rounded-[35px] shadow-xl shadow-indigo-100/50 border border-slate-100 mt-2">
                <div class="flex justify-between mb-3 items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Overall Budget Burn</span>
                    <span id="burn-percent" class="bg-slate-900 text-white px-3 py-1 rounded-full text-[10px] font-black tracking-tighter">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden p-1 shadow-inner">
                    <div id="burn-progress" class="h-full rounded-full transition-all duration-1000 bg-gradient-to-r from-blue-600 to-indigo-600" style="width: 0%"></div>
                </div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-3 ml-2">
                    <span class="text-lg">🗺️</span>
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Regional Health</p>
                </div>
                <div id="regional-stats" class="space-y-4"></div>
            </div>

        </div>

        <div id="tab-content" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>

        <div id="admin-panel" class="hidden space-y-6">
            <section class="bg-white p-8 rounded-[40px] shadow-2xl border border-slate-100">
                <h2 class="text-xl font-black text-slate-800 mb-6">System Controls</h2>
                
                <div class="space-y-5">
                    <div class="p-6 bg-slate-50 rounded-3xl border border-slate-200">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">1. Master Budget (£)</p>
                        <div class="relative mb-4">
                            <span class="absolute left-5 top-4 text-indigo-600 font-black text-xl">£</span>
                            <input type="number" id="input-gbp-limit" class="admin-input-premium" placeholder="5000">
                        </div>
                        <button onclick="saveAdminSettings()" class="btn-action bg-indigo-600">Save Budget</button>
                    </div>

                    <div class="p-6 bg-slate-50 rounded-3xl border border-slate-200 grid gap-3">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">2. System Maintenance</p>
                        <button onclick="systemSync()" class="btn-action bg-slate-800 text-[10px]">
                            🔄 Fetch Live Currency
                        </button>
                        <button onclick="forceAppUpdate()" class="btn-action bg-rose-500 text-[10px]">
                            ⚡ Force App Version Update
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <nav class="nav-container">
        <div class="nav-wrapper">
            <button onclick="switchTab('LA')" id="nav-LA" class="nav-btn">
                <span class="nav-icon">🌴</span><span class="nav-text">LA</span>
            </button>
            <button onclick="switchTab('Utah')" id="nav-Utah" class="nav-btn">
                <span class="nav-icon">🏔️</span><span class="nav-text">Utah</span>
            </button>
            <button onclick="switchTab('Home')" id="nav-Home" class="nav-btn-center">
                <span>🏠</span>
            </button>
            <button onclick="switchTab('Vegas')" id="nav-Vegas" class="nav-btn">
                <span class="nav-icon">🎰</span><span class="nav-text">Vegas</span>
            </button>
            <button onclick="switchTab('Admin')" id="nav-Admin" class="nav-btn">
                <span class="nav-icon">⚙️</span><span class="nav-text">Admin</span>
            </button>
        </div>
    </nav>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-50 p-4 flex items-center justify-center">
        <div class="modal-overlay absolute inset-0 bg-slate-900/40 backdrop-blur-md"></div>
        <div class="modal-container bg-white w-full max-w-md rounded-[48px] shadow-2xl z-50 overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-black tracking-tight" id="modal-title">Edit Entry</h3>
                    <button onclick="toggleModal()" class="bg-slate-100 p-2 rounded-full text-slate-400 hover:bg-slate-200 transition-colors">✕</button>
                </div>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="modal-field">
                            <label>Planned ($)</label>
                            <input type="number" id="edit-usd">
                        </div>
                        <div class="modal-field">
                            <label class="text-indigo-600">Spent ($)</label>
                            <input type="number" id="edit-spent" class="bg-indigo-50 border-indigo-200 text-indigo-700">
                        </div>
                    </div>
                    <div class="modal-field">
                        <label>Notes & Activities</label>
                        <textarea id="edit-activity" rows="3"></textarea>
                    </div>
                    <button onclick="saveChanges()" class="btn-action bg-indigo-600 mt-2">Save & Update Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://open.er-api.com/v6/latest/GBP";
        let exchangeRate = 1.35; 
        let currentTab = localStorage.getItem('activeTab_v2.7') || 'Home';
        let bankrollGbp = localStorage.getItem('bankrollGbp') || 5000;
        let editingIndex = null;

        const defaultData = [
            { day: "Mon 20-Jul", loc: "LA", activity: "Pizza", usd: 50, spent: 0 },
            { day: "Tue 21-Jul", loc: "LA", activity: "Disneyland", usd: 500, spent: 0 },
            { day: "Wed 22-Jul", loc: "LA", activity: "San Diego", usd: 400, spent: 0 },
            { day: "Thu 23-Jul", loc: "LA", activity: "LA: Lunch/Dinner", usd: 400, spent: 0 },
            { day: "Fri 24-Jul", loc: "Utah", activity: "Travel to Utah", usd: 500, spent: 0 },
            { day: "Sat 25-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sun 26-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Mon 27-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Tue 28-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Wed 29-Jul", loc: "Utah", activity: "Utah (SLC)", usd: 500, spent: 0 },
            { day: "Thu 30-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", usd: 300, spent: 0 },
            { day: "Fri 31-Jul", loc: "Utah", activity: "Utah: Dinner", usd: 250, spent: 0 },
            { day: "Sat 01-Aug", loc: "Vegas", activity: "Travel to Vegas", usd: 500, spent: 0 },
            { day: "Sun 02-Aug", loc: "Vegas", activity: "Vegas Shopping", usd: 1000, spent: 0 },
            { day: "Mon 03-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 300, spent: 0 },
            { day: "Tue 04-Aug", loc: "Vegas", activity: "Vegas Dinner", usd: 200, spent: 0 },
            { day: "Wed 05-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 500, spent: 0 },
            { day: "Thu 06-Aug", loc: "Vegas", activity: "Vegas L/D", usd: 200, spent: 0 },
            { day: "Fri 07-Aug", loc: "Home", activity: "Flight Home", usd: 0, spent: 0 }
        ];

        let tripData = JSON.parse(localStorage.getItem('holidayBudget_v2.7')) || 
                       JSON.parse(localStorage.getItem('holidayBudget_v2.6')) || 
                       defaultData;

        async function init() {
            await fetchRates();
            document.getElementById('input-gbp-limit').value = bankrollGbp;
            switchTab(currentTab);
        }

        async function fetchRates() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                exchangeRate = data.rates.USD;
                document.getElementById('usd-rate').innerText = exchangeRate.toFixed(2);
            } catch (e) { console.warn("API Offline"); }
        }

        function switchTab(tabName) {
            currentTab = tabName;
            localStorage.setItem('activeTab_v2.7', tabName);
            
            const header = document.getElementById('main-header');
            header.className = `sticky top-0 z-30 transition-all duration-500 theme-${tabName.toLowerCase()}`;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`nav-${tabName}`)) document.getElementById(`nav-${tabName}`).classList.add('active');
            
            document.getElementById('view-title').innerText = (tabName === 'Home' ? 'Master Budget' : tabName + ' Budget');
            
            const dash = document.getElementById('dashboard-view');
            const grid = document.getElementById('tab-content');
            const admin = document.getElementById('admin-panel');
            const headStats = document.getElementById('header-stats');

            dash.classList.add('hidden');
            grid.classList.add('hidden');
            admin.classList.add('hidden');

            if(tabName === 'Admin') {
                headStats.classList.add('hidden');
                admin.classList.remove('hidden');
            } else {
                headStats.classList.remove('hidden');
                
                if(tabName === 'Home') {
                    dash.classList.remove('hidden');
                    updateDashboard();
                } else {
                    grid.classList.remove('hidden');
                    renderGrid(tabName);
                }
                updateHeaderStats(tabName); 
            }
        }

        function updateHeaderStats(tabName) {
            let plannedUsd = 0, spentUsd = 0, leftUsd = 0;
            
            if (tabName === 'Home') {
                spentUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
                plannedUsd = bankrollGbp * exchangeRate;
                leftUsd = plannedUsd - spentUsd;
            } else {
                const locData = tripData.filter(d => d.loc === tabName);
                plannedUsd = locData.reduce((s, i) => s + (parseFloat(i.usd) || 0), 0);
                spentUsd = locData.reduce((s, i) => s + (parseFloat(i.spent) || 0), 0);
                leftUsd = plannedUsd - spentUsd;
            }

            const plannedGbp = plannedUsd / exchangeRate;
            const spentGbp = spentUsd / exchangeRate;
            const leftGbp = leftUsd / exchangeRate;

            document.getElementById('stat-goal-usd').innerText = `$${Math.round(plannedUsd)}`;
            document.getElementById('stat-spent-usd').innerText = `$${Math.round(spentUsd)}`;
            document.getElementById('stat-remain-usd').innerText = `$${Math.round(leftUsd)}`;
            
            document.getElementById('stat-goal-gbp').innerText = `£${Math.round(plannedGbp)}`;
            document.getElementById('stat-spent-gbp').innerText = `£${Math.round(spentGbp)}`;
            document.getElementById('stat-remain-gbp').innerText = `£${Math.round(leftGbp)}`;
            
            const pill = document.getElementById('remain-pill');
            if (leftUsd < 0) {
                pill.className = "header-stat-pill bg-rose-500/90 border-rose-400 transition-colors";
            } else {
                pill.className = "header-stat-pill bg-white/30 border-white/50 transition-colors";
            }
        }

        function updateDashboard() {
            const totalActualUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
            const limitUsd = bankrollGbp * exchangeRate;
            const burnPercent = (totalActualUsd / limitUsd) * 100;

            document.getElementById('burn-percent').innerText = `${Math.round(burnPercent)}%`;
            document.getElementById('burn-progress').style.width = `${Math.min(burnPercent, 100)}%`;

            const locs = { 'LA': '🌴', 'Utah': '🏔️', 'Vegas': '🎰' };
            const regionalContainer = document.getElementById('regional-stats');
            regionalContainer.innerHTML = Object.entries(locs).map(([loc, icon]) => {
                const data = tripData.filter(d => d.loc === loc);
                const plannedUsd = data.reduce((s, i) => s + i.usd, 0);
                const actualUsd = data.reduce((s, i) => s + i.spent, 0);
                const diffUsd = plannedUsd - actualUsd;
                
                const plannedGbp = (plannedUsd / exchangeRate).toFixed(0);
                const actualGbp = (actualUsd / exchangeRate).toFixed(0);
                const diffGbp = (diffUsd / exchangeRate).toFixed(0);

                const statusBorder = actualUsd === 0 ? 'border-slate-100' : (diffUsd >= 0 ? 'border-green-400' : 'border-red-400');

                return `
                <div class="bg-white p-5 rounded-[30px] border-l-8 ${statusBorder} shadow-md shadow-slate-200/50">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${icon}</span>
                            <p class="text-[11px] font-black uppercase tracking-widest text-slate-400">${loc}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[8px] font-black text-slate-300 uppercase mb-0.5">Balance</p>
                             <p class="text-sm font-black ${diffUsd >= 0 ? 'text-green-600' : 'text-red-600'}">$${diffUsd} <span class="text-[10px] opacity-40">/ £${diffGbp}</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-3">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase">Plan</p>
                            <p class="text-xs font-bold">$${plannedUsd} <span class="text-[9px] text-slate-300">/ £${plannedGbp}</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Spent</p>
                            <p class="text-xs font-black text-slate-900">$${actualUsd} <span class="text-[9px] text-slate-400">/ £${actualGbp}</span></p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderGrid(filter) {
            const grid = document.getElementById('tab-content');
            const data = tripData.filter(d => d.loc === filter);
            
            grid.innerHTML = data.map((item) => {
                const globalIndex = tripData.findIndex(d => d.day === item.day);
                return `
                <div class="ticket-card">
                    <div class="p-5 pb-4">
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-slate-900 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-sm">${item.day}</span>
                            <button onclick="openEdit(${globalIndex})" class="bg-slate-100 text-slate-500 hover:bg-slate-200 px-3 py-1 rounded-full text-[9px] font-black uppercase transition-colors">Edit</button>
                        </div>
                        <p class="text-sm font-bold text-slate-700 leading-snug line-clamp-2 min-h-[40px]">"${item.activity}"</p>
                    </div>
                    
                    <div class="relative border-t-2 border-dashed border-slate-200 mx-4">
                        <div class="absolute -left-6 -top-2 w-4 h-4 bg-slate-50 rounded-full"></div>
                        <div class="absolute -right-6 -top-2 w-4 h-4 bg-slate-50 rounded-full"></div>
                    </div>

                    <div class="p-5 pt-4 bg-slate-50/50 rounded-b-[32px] grid grid-cols-2 gap-4 items-center">
                        <div>
                            <span class="inline-block bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[8px] font-black uppercase mb-1">Goal Plan</span>
                            <p class="text-xl font-black text-slate-800">$${item.usd}</p>
                        </div>
                        <div class="text-right border-l border-slate-200 pl-4">
                            <span class="inline-block bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[8px] font-black uppercase mb-1">Actual Spend</span>
                            <p class="text-xl font-black text-emerald-600">$${item.spent}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function saveAdminSettings() {
            bankrollGbp = document.getElementById('input-gbp-limit').value;
            localStorage.setItem('bankrollGbp', bankrollGbp);
            localStorage.setItem('holidayBudget_v2.7', JSON.stringify(tripData));
            switchTab('Home');
            alert("✅ Budget Plan Updated!");
        }

        async function systemSync() {
            const btn = event.target;
            btn.innerText = "Syncing...";
            await fetchRates();
            btn.innerText = "🔄 Fetch Live Currency";
            updateDashboard();
            updateHeaderStats(currentTab);
            alert("🚀 Live Rates Synced.");
        }

        function forceAppUpdate() {
            if(confirm("This will unregister the Service Worker and pull the absolute newest version. Proceed?")) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for(let registration of registrations) {
                            registration.unregister();
                        }
                    });
                }
                caches.keys().then((keyList) => {
                    return Promise.all(keyList.map((key) => {
                        return caches.delete(key);
                    }));
                }).then(() => {
                    alert("Cache cleared! The app will now hard refresh.");
                    window.location.reload(true);
                });
            }
        }

        function openEdit(index) {
            editingIndex = index;
            const item = tripData[index];
            document.getElementById('modal-title').innerText = item.day;
            document.getElementById('edit-usd').value = item.usd;
            document.getElementById('edit-spent').value = item.spent;
            document.getElementById('edit-activity').value = item.activity;
            toggleModal();
        }

        function saveChanges() {
            tripData[editingIndex].usd = parseFloat(document.getElementById('edit-usd').value) || 0;
            tripData[editingIndex].spent = parseFloat(document.getElementById('edit-spent').value) || 0;
            tripData[editingIndex].activity = document.getElementById('edit-activity').value;
            localStorage.setItem('holidayBudget_v2.7', JSON.stringify(tripData));
            toggleModal();
            switchTab(currentTab);
        }

        function toggleModal() {
            document.getElementById('modal').classList.toggle('opacity-0');
            document.getElementById('modal').classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        init();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
