<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>USA Trip Tracker v3.1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#4338ca">
</head>
<body class="bg-slate-50 text-slate-900 no-scrollbar transition-colors duration-300">

    <header id="main-header" class="theme-home sticky top-0 z-30 transition-all duration-500">
        <div class="max-w-6xl mx-auto p-6 pb-5">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-black text-white tracking-tighter">USA '26</h1>
                    <p id="view-title" class="text-white/80 text-[10px] uppercase font-black tracking-[0.2em]">Master Budget</p>
                </div>
                <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/30 text-white shadow-sm">
                    <p class="text-[8px] font-black uppercase opacity-70 leading-none mb-1">Live Rate</p>
                    <p class="text-sm font-mono font-black">£1 = $<span id="usd-rate">1.35</span></p>
                </div>
            </div>
            
            <div id="header-stats" class="grid grid-cols-3 gap-3">
                <div class="header-stat-pill">
                    <p class="stat-label">Budget</p>
                    <p id="stat-goal-usd" class="stat-val anim-val" data-val="0">$0</p>
                    <p id="stat-goal-gbp" class="stat-val-sub">£0</p>
                </div>
                <div class="header-stat-pill">
                    <p class="stat-label">Spent</p>
                    <p id="stat-spent-usd" class="stat-val text-orange-200 anim-val" data-val="0">$0</p>
                    <p id="stat-spent-gbp" class="stat-val-sub text-orange-200/70">£0</p>
                </div>
                <div id="remain-pill" class="header-stat-pill bg-white/30 border-white/50 transition-colors">
                    <p class="stat-label">Balance</p>
                    <p id="stat-remain-usd" class="stat-val anim-val" data-val="0">$0</p>
                    <p id="stat-remain-gbp" class="stat-val-sub">£0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 safe-bottom">
        
        <div id="dashboard-view" class="space-y-6">
            
            <div class="surface-card p-6 rounded-[35px] shadow-xl shadow-indigo-100/50 mt-2 border-surface">
                <div class="flex justify-between mb-3 items-center">
                    <span class="text-[10px] font-black text-mute uppercase tracking-widest">Overall Budget Burn</span>
                    <span id="burn-percent" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-3 py-1 rounded-full text-[10px] font-black tracking-tighter">0%</span>
                </div>
                <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 overflow-hidden p-1 shadow-inner">
                    <div id="burn-progress" class="h-full rounded-full transition-all duration-1000 bg-gradient-to-r from-blue-600 to-indigo-600" style="width: 0%"></div>
                </div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-3 ml-2">
                    <span class="text-lg">🗺️</span>
                    <p class="text-[11px] font-black text-mute uppercase tracking-widest">Regional Health</p>
                </div>
                <div id="regional-stats" class="space-y-4"></div>
            </div>
        </div>

        <div id="tab-content" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>

        <div id="admin-panel" class="hidden space-y-6">
            <section class="surface-card p-8 rounded-[40px] shadow-2xl border-surface">
                <h2 class="text-xl font-black text-primary mb-6">System Controls</h2>
                
                <div class="space-y-5">
                    <div class="p-6 bg-surface-alt rounded-3xl border-surface flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-mute uppercase tracking-widest">Vegas Mode</p>
                            <p class="text-xs font-bold text-primary mt-1">Dark Theme</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="dark-mode-toggle" class="sr-only peer" onchange="toggleDarkMode()">
                          <div class="w-14 h-7 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>

                    <div class="p-6 bg-surface-alt rounded-3xl border-surface">
                        <p class="text-[10px] font-black text-mute uppercase mb-4 tracking-widest">Master Budget (£)</p>
                        <div class="relative mb-4">
                            <span class="absolute left-5 top-4 text-indigo-600 font-black text-xl">£</span>
                            <input type="number" id="input-gbp-limit" class="admin-input-premium" placeholder="5000">
                        </div>
                        <button onclick="saveAdminSettings()" class="btn-action bg-indigo-600">Save Budget</button>
                    </div>

                    <div class="p-6 bg-surface-alt rounded-3xl border-surface grid gap-3">
                        <p class="text-[10px] font-black text-mute uppercase mb-1 tracking-widest">System Maintenance</p>
                        <button onclick="systemSync()" class="btn-action bg-slate-800 dark:bg-slate-200 dark:text-slate-900 text-[10px]">
                            🔄 Fetch Live Currency
                        </button>
                        <button onclick="forceAppUpdate()" class="btn-action bg-rose-500 text-[10px]">
                            ⚡ Force App Version Update
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <nav class="nav-container">
        <div class="nav-wrapper">
            <button onclick="switchTab('LA')" id="nav-LA" class="nav-btn"><span class="nav-icon">🌴</span><span class="nav-text">LA</span></button>
            <button onclick="switchTab('Utah')" id="nav-Utah" class="nav-btn"><span class="nav-icon">🏔️</span><span class="nav-text">Utah</span></button>
            <button onclick="switchTab('Home')" id="nav-Home" class="nav-btn-center"><span>🏠</span></button>
            <button onclick="switchTab('Vegas')" id="nav-Vegas" class="nav-btn"><span class="nav-icon">🎰</span><span class="nav-text">Vegas</span></button>
            <button onclick="switchTab('Admin')" id="nav-Admin" class="nav-btn"><span class="nav-icon">⚙️</span><span class="nav-text">Admin</span></button>
        </div>
    </nav>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-50 flex items-end justify-center sm:items-center">
        <div class="modal-overlay absolute inset-0 bg-slate-900/60 backdrop-blur-xl transition-opacity duration-300" onclick="toggleModal()"></div>
        <div class="modal-content-sheet bg-surface w-full sm:max-w-md rounded-t-[40px] sm:rounded-[40px] shadow-2xl z-50 overflow-hidden pb-8 sm:pb-0">
            <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mt-4 mb-2 sm:hidden"></div>
            <div class="p-8 pt-4">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black tracking-tight text-primary" id="modal-title">Edit Entry</h3>
                    <button onclick="toggleModal()" class="bg-surface-alt p-2 rounded-full text-mute hover:text-primary transition-colors">✕</button>
                </div>
                <div class="space-y-5">
                    
                    <div class="modal-field">
                        <label>Category</label>
                        <select id="edit-cat" class="modal-input-premium appearance-none">
                            <option value="🛍️ Mixed">🛍️ Mixed</option>
                            <option value="🍔 Food">🍔 Food</option>
                            <option value="🚕 Transport">🚕 Transport</option>
                            <option value="🎢 Fun">🎢 Fun</option>
                            <option value="🏨 Stay">🏨 Stay</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="modal-field">
                            <label>Planned ($)</label>
                            <input type="number" id="edit-usd" class="modal-input-premium">
                        </div>
                        <div class="modal-field">
                            <label class="text-indigo-600 dark:text-indigo-400">Spent ($)</label>
                            <input type="number" id="edit-spent" class="modal-input-premium accent">
                        </div>
                    </div>
                    <div class="modal-field">
                        <label>Notes</label>
                        <textarea id="edit-activity" class="modal-input-premium text-sm" rows="2"></textarea>
                    </div>
                    <button onclick="saveChanges()" class="btn-action bg-indigo-600 mt-2">Save & Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://open.er-api.com/v6/latest/GBP";
        let exchangeRate = 1.35; 
        let currentTab = localStorage.getItem('activeTab_v3.1') || 'Home';
        let bankrollGbp = localStorage.getItem('bankrollGbp') || 5000;
        let isDarkMode = localStorage.getItem('vegasMode') === 'true';
        let editingIndex = null;

        const defaultData = [
            { day: "Mon 20-Jul", loc: "LA", activity: "Pizza", cat: "🍔 Food", usd: 50, spent: 0 },
            { day: "Tue 21-Jul", loc: "LA", activity: "Disneyland", cat: "🎢 Fun", usd: 500, spent: 0 },
            { day: "Wed 22-Jul", loc: "LA", activity: "San Diego", cat: "🛍️ Mixed", usd: 400, spent: 0 },
            { day: "Thu 23-Jul", loc: "LA", activity: "LA: Lunch/Dinner", cat: "🍔 Food", usd: 400, spent: 0 },
            { day: "Fri 24-Jul", loc: "Utah", activity: "Travel to Utah", cat: "🚕 Transport", usd: 500, spent: 0 },
            { day: "Sat 25-Jul", loc: "Utah", activity: "Utah: Dinner", cat: "🍔 Food", usd: 250, spent: 0 },
            { day: "Sun 26-Jul", loc: "Utah", activity: "Utah: Dinner", cat: "🍔 Food", usd: 250, spent: 0 },
            { day: "Mon 27-Jul", loc: "Utah", activity: "Utah: Dinner", cat: "🍔 Food", usd: 250, spent: 0 },
            { day: "Tue 28-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", cat: "🍔 Food", usd: 300, spent: 0 },
            { day: "Wed 29-Jul", loc: "Utah", activity: "Utah (SLC)", cat: "🛍️ Mixed", usd: 500, spent: 0 },
            { day: "Thu 30-Jul", loc: "Utah", activity: "Utah: Lunch/Dinner", cat: "🍔 Food", usd: 300, spent: 0 },
            { day: "Fri 31-Jul", loc: "Utah", activity: "Utah: Dinner", cat: "🍔 Food", usd: 250, spent: 0 },
            { day: "Sat 01-Aug", loc: "Vegas", activity: "Travel to Vegas", cat: "🚕 Transport", usd: 500, spent: 0 },
            { day: "Sun 02-Aug", loc: "Vegas", activity: "Vegas Shopping", cat: "🛍️ Mixed", usd: 1000, spent: 0 },
            { day: "Mon 03-Aug", loc: "Vegas", activity: "Vegas L/D", cat: "🍔 Food", usd: 300, spent: 0 },
            { day: "Tue 04-Aug", loc: "Vegas", activity: "Vegas Dinner", cat: "🍔 Food", usd: 200, spent: 0 },
            { day: "Wed 05-Aug", loc: "Vegas", activity: "Vegas L/D", cat: "🍔 Food", usd: 500, spent: 0 },
            { day: "Thu 06-Aug", loc: "Vegas", activity: "Vegas L/D", cat: "🍔 Food", usd: 200, spent: 0 },
            { day: "Fri 07-Aug", loc: "Home", activity: "Flight Home", cat: "🚕 Transport", usd: 0, spent: 0 }
        ];

        let tripData = JSON.parse(localStorage.getItem('holidayBudget_v3.1')) || 
                       JSON.parse(localStorage.getItem('holidayBudget_v3.0')) || 
                       defaultData;

        tripData = tripData.map(item => ({...item, cat: item.cat || "🛍️ Mixed"}));

        async function init() {
            applyTheme();
            await fetchRates();
            document.getElementById('input-gbp-limit').value = bankrollGbp;
            document.getElementById('dark-mode-toggle').checked = isDarkMode;
            switchTab(currentTab);
        }

        function applyTheme() {
            if (isDarkMode) document.body.classList.add('dark');
            else document.body.classList.remove('dark');
        }

        function toggleDarkMode() {
            isDarkMode = document.getElementById('dark-mode-toggle').checked;
            localStorage.setItem('vegasMode', isDarkMode);
            applyTheme();
        }

        async function fetchRates() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                exchangeRate = data.rates.USD;
                document.getElementById('usd-rate').innerText = exchangeRate.toFixed(2);
            } catch (e) { console.warn("API Offline"); }
        }

        function animateValue(objId, end, duration = 1000) {
            const obj = document.getElementById(objId);
            if(!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentVal = Math.floor(easeOut * end);
                obj.innerText = `$${currentVal}`;
                if (progress < 1) window.requestAnimationFrame(step);
                else obj.innerText = `$${end}`;
            };
            window.requestAnimationFrame(step);
        }

        function switchTab(tabName) {
            currentTab = tabName;
            localStorage.setItem('activeTab_v3.1', tabName);
            
            const header = document.getElementById('main-header');
            header.className = `sticky top-0 z-30 transition-all duration-500 theme-${tabName.toLowerCase()}`;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`nav-${tabName}`)) document.getElementById(`nav-${tabName}`).classList.add('active');
            
            document.getElementById('view-title').innerText = (tabName === 'Home' ? 'Master Budget' : tabName + ' Budget');
            
            const views = ['dashboard-view', 'tab-content', 'admin-panel'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));

            if(tabName === 'Admin') {
                document.getElementById('header-stats').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('header-stats').classList.remove('hidden');
                if(tabName === 'Home') {
                    document.getElementById('dashboard-view').classList.remove('hidden');
                    updateDashboard();
                } else {
                    document.getElementById('tab-content').classList.remove('hidden');
                    renderGrid(tabName);
                }
                updateHeaderStats(tabName); 
            }
        }

        function updateHeaderStats(tabName) {
            let plannedUsd = 0, spentUsd = 0, leftUsd = 0;
            if (tabName === 'Home') {
                spentUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
                plannedUsd = bankrollGbp * exchangeRate;
                leftUsd = plannedUsd - spentUsd;
            } else {
                const locData = tripData.filter(d => d.loc === tabName);
                plannedUsd = locData.reduce((s, i) => s + (parseFloat(i.usd) || 0), 0);
                spentUsd = locData.reduce((s, i) => s + (parseFloat(i.spent) || 0), 0);
                leftUsd = plannedUsd - spentUsd;
            }

            animateValue('stat-goal-usd', Math.round(plannedUsd));
            animateValue('stat-spent-usd', Math.round(spentUsd));
            animateValue('stat-remain-usd', Math.round(leftUsd));
            
            document.getElementById('stat-goal-gbp').innerText = `£${Math.round(plannedUsd / exchangeRate)}`;
            document.getElementById('stat-spent-gbp').innerText = `£${Math.round(spentUsd / exchangeRate)}`;
            document.getElementById('stat-remain-gbp').innerText = `£${Math.round(leftUsd / exchangeRate)}`;
            
            const pill = document.getElementById('remain-pill');
            if (leftUsd < 0) pill.className = "header-stat-pill bg-rose-500/90 border-rose-400 transition-colors";
            else pill.className = "header-stat-pill bg-white/30 border-white/50 transition-colors";
        }

        function updateDashboard() {
            const totalActualUsd = tripData.reduce((s, i) => s + parseFloat(i.spent || 0), 0);
            const limitUsd = bankrollGbp * exchangeRate;
            const burnPercent = (totalActualUsd / limitUsd) * 100;

            document.getElementById('burn-percent').innerText = `${Math.round(burnPercent)}%`;
            document.getElementById('burn-progress').style.width = `${Math.min(burnPercent, 100)}%`;

            const locs = { 'LA': '🌴', 'Utah': '🏔️', 'Vegas': '🎰' };
            const regionalContainer = document.getElementById('regional-stats');
            regionalContainer.innerHTML = Object.entries(locs).map(([loc, icon]) => {
                const data = tripData.filter(d => d.loc === loc);
                const plannedUsd = data.reduce((s, i) => s + i.usd, 0);
                const actualUsd = data.reduce((s, i) => s + i.spent, 0);
                const diffUsd = plannedUsd - actualUsd;
                const statusBorder = actualUsd === 0 ? 'border-surface-alt' : (diffUsd >= 0 ? 'border-green-400 dark:border-green-600' : 'border-red-400 dark:border-red-600');

                return `
                <div class="surface-card p-5 rounded-[30px] border-l-8 ${statusBorder} shadow-md shadow-slate-200/20 dark:shadow-none transition-colors">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${icon}</span>
                            <p class="text-[11px] font-black uppercase tracking-widest text-mute">${loc}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[8px] font-black text-mute uppercase mb-0.5">Balance</p>
                             <p class="text-sm font-black ${diffUsd >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}">$${diffUsd} <span class="text-[10px] opacity-40">/ £${(diffUsd/exchangeRate).toFixed(0)}</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-surface pt-3">
                        <div>
                            <p class="text-[8px] font-black text-mute uppercase">Plan</p>
                            <p class="text-xs font-bold text-primary">$${plannedUsd} <span class="text-[9px] text-mute">/ £${(plannedUsd/exchangeRate).toFixed(0)}</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-mute uppercase">Spent</p>
                            <p class="text-xs font-black text-primary">$${actualUsd} <span class="text-[9px] text-mute">/ £${(actualUsd/exchangeRate).toFixed(0)}</span></p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        let touchStartX = 0;
        let touchEndX = 0;

        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchEnd(e, index) {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 60) openEdit(index); 
        }

        function renderGrid(filter) {
            const grid = document.getElementById('tab-content');
            const data = tripData.filter(d => d.loc === filter);
            
            grid.innerHTML = data.map((item) => {
                const globalIndex = tripData.findIndex(d => d.day === item.day);
                
                // Parse "Mon 20-Jul" into Calendar Stub
                let dayName = "Day", dayNum = "00", month = "MTH";
                if(item.day.includes(' ')) {
                    const parts = item.day.split(' ');
                    dayName = parts[0];
                    if(parts[1] && parts[1].includes('-')) {
                        const dParts = parts[1].split('-');
                        dayNum = dParts[0];
                        month = dParts[1];
                    } else {
                        dayNum = parts[1];
                    }
                }

                return `
                <div class="ticket-card surface-card" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event, ${globalIndex})">
                    <div class="absolute inset-y-0 right-0 bg-indigo-500 w-16 rounded-r-[32px] flex items-center justify-center -z-10 opacity-0 transition-opacity">
                        <span class="text-white text-xs font-bold -rotate-90 tracking-widest">EDIT</span>
                    </div>
                    <div class="ticket-content bg-surface rounded-[32px] transition-transform flex flex-col">
                        
                        <div class="p-4 flex gap-4 items-center relative">
                            <div class="flex-shrink-0 bg-gradient-to-b from-indigo-500 to-purple-600 rounded-2xl p-2 w-14 text-center shadow-lg shadow-indigo-500/30 text-white">
                                <p class="text-[8px] font-black uppercase opacity-80">${month}</p>
                                <p class="text-2xl font-black leading-none my-0.5 tracking-tighter">${dayNum}</p>
                                <p class="text-[8px] font-black uppercase opacity-80">${dayName}</p>
                            </div>
                            
                            <div class="flex-grow">
                                <div class="flex justify-between items-start mb-1.5">
                                    <span class="bg-surface-alt text-mute px-2 py-0.5 rounded-md text-[8px] font-black tracking-widest border border-surface">${item.cat}</span>
                                    <button onclick="openEdit(${globalIndex})" class="text-slate-300 dark:text-slate-600 hover:text-indigo-500 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.89l10.68-10.68z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 7.125L16.862 4.487" /></svg>
                                    </button>
                                </div>
                                <p class="text-sm font-bold text-primary leading-tight line-clamp-2">"${item.activity}"</p>
                            </div>
                        </div>

                        <div class="relative border-t-2 border-dashed border-surface-alt mx-4">
                            <div class="absolute -left-6 -top-2 w-4 h-4 bg-slate-50 dark:bg-slate-900 rounded-full border border-surface-alt"></div>
                            <div class="absolute -right-6 -top-2 w-4 h-4 bg-slate-50 dark:bg-slate-900 rounded-full border border-surface-alt"></div>
                        </div>

                        <div class="p-4 bg-surface-alt rounded-b-[32px] grid grid-cols-2 gap-4 items-center">
                            <div>
                                <span class="inline-block bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-2 py-0.5 rounded text-[8px] font-black uppercase mb-0.5">Goal Plan</span>
                                <p class="text-lg font-black text-primary">$${item.usd}</p>
                            </div>
                            <div class="text-right border-l border-surface pl-4">
                                <span class="inline-block bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 px-2 py-0.5 rounded text-[8px] font-black uppercase mb-0.5">Actual Spend</span>
                                <p class="text-lg font-black text-emerald-600 dark:text-emerald-400">$${item.spent}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function saveAdminSettings() {
            bankrollGbp = document.getElementById('input-gbp-limit').value;
            localStorage.setItem('bankrollGbp', bankrollGbp);
            localStorage.setItem('holidayBudget_v3.1', JSON.stringify(tripData));
            switchTab('Home');
        }

        async function systemSync() {
            await fetchRates();
            updateDashboard();
            updateHeaderStats(currentTab);
            alert("🚀 Live Rates Synced.");
        }

        function forceAppUpdate() {
            if(confirm("Force App Update?")) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
                }
                caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
                      .then(() => window.location.reload(true));
            }
        }

        function openEdit(index) {
            editingIndex = index;
            const item = tripData[index];
            document.getElementById('modal-title').innerText = item.day;
            document.getElementById('edit-cat').value = item.cat || "🛍️ Mixed";
            document.getElementById('edit-usd').value = item.usd;
            document.getElementById('edit-spent').value = item.spent;
            document.getElementById('edit-activity').value = item.activity;
            toggleModal();
        }

        function saveChanges() {
            tripData[editingIndex].cat = document.getElementById('edit-cat').value;
            tripData[editingIndex].usd = parseFloat(document.getElementById('edit-usd').value) || 0;
            tripData[editingIndex].spent = parseFloat(document.getElementById('edit-spent').value) || 0;
            tripData[editingIndex].activity = document.getElementById('edit-activity').value;
            localStorage.setItem('holidayBudget_v3.1', JSON.stringify(tripData));
            toggleModal();
            switchTab(currentTab);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            if (m.classList.contains('opacity-0')) {
                m.classList.remove('opacity-0', 'pointer-events-none');
                document.body.classList.add('modal-active');
            } else {
                m.classList.add('opacity-0', 'pointer-events-none');
                document.body.classList.remove('modal-active');
            }
        }

        init();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
